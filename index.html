<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>2025年度実働訓練アンケート</title>
<style>
:root{--pr:#1a4a7a;--pl:#2563a8;--ac:#e85d26;--bg:#f4f6f9;--cd:#fff;--tx:#1e2d3d;--ts:#5a6a7a;--bd:#d0dbe8;--gr:#2e7d52;--er:#c0392b;}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'HGMaruGothicMPRO','HG丸ゴシックM-PRO',Meiryo,'Yu Gothic UI',sans-serif;font-weight:700;background:var(--bg);color:var(--tx);min-height:100vh;}
.hdr{background:linear-gradient(135deg,#0f2d4a,#1a4a7a);color:#fff;padding:32px 0 0;position:relative;overflow:hidden;}
.hdr-in{max-width:720px;margin:0 auto;position:relative;z-index:1;padding:32px 16px 32px;}
.badge{display:inline-block;background:var(--ac);color:#fff;font-size:11px;padding:2px 10px;border-radius:2px;margin-bottom:10px;font-weight:700;letter-spacing:.08em;}
.hdr h1{font-size:clamp(17px,4vw,23px);font-weight:700;letter-spacing:.04em;margin-bottom:12px;line-height:1.4;}
.hdr p{font-size:13px;line-height:1.8;color:rgba(255,255,255,.85);max-width:580px;}
.req-note{font-size:11px;color:rgba(255,255,255,.55);margin-top:10px;}
.req-note span{color:#ff8a65;}
.pb-wrap{max-width:720px;margin:16px auto 0;padding:0 16px;}
.pb{height:4px;background:var(--bd);border-radius:2px;overflow:hidden;}
.pf{height:100%;background:linear-gradient(90deg,var(--pr),var(--ac));border-radius:2px;transition:width .4s;}
.con{max-width:720px;margin:0 auto;padding:20px 16px 60px;}
.sh{background:linear-gradient(90deg,var(--pr),var(--pl));color:#fff;padding:10px 18px;border-radius:6px 6px 0 0;font-size:13px;font-weight:700;margin-top:24px;}
.qw{background:var(--cd);border:1px solid var(--bd);border-top:none;padding:18px 18px 14px;}
.qw:last-child{border-radius:0 0 6px 6px;}
.ql{font-size:14px;font-weight:700;line-height:1.7;margin-bottom:10px;}
.qn{display:inline-block;background:var(--pr);color:#fff;font-size:11px;min-width:26px;height:19px;line-height:19px;text-align:center;border-radius:3px;margin-right:7px;font-weight:700;vertical-align:middle;}
.req{color:var(--ac);margin-left:3px;}
.hint{font-size:11px;color:var(--ts);margin-bottom:8px;margin-top:-6px;}
.opts{display:flex;flex-direction:column;gap:7px;}
.opt{display:flex;align-items:center;gap:10px;padding:9px 13px;border:1.5px solid var(--bd);border-radius:6px;cursor:pointer;transition:all .15s;background:#fafbfc;font-size:13.5px;user-select:none;}
.opt:hover{border-color:var(--pl);background:#edf3fb;}
.opt input[type=radio]{display:none;}
.rd{width:19px;height:19px;border:2px solid var(--bd);border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all .15s;}
.opt input[type=radio]:checked+.rd{border-color:var(--pr);background:var(--pr);}
.opt input[type=radio]:checked+.rd::after{content:'';width:6px;height:6px;background:#fff;border-radius:50%;}
.opt.sel{border-color:var(--pr);background:#edf3fb;}
.opt.sel .ot{color:var(--pr);font-weight:700;}
.frt{width:100%;min-height:90px;border:1.5px solid var(--bd);border-radius:6px;padding:10px 13px;font-family:inherit;font-size:13.5px;font-weight:700;line-height:1.7;color:var(--tx);background:#fafbfc;resize:vertical;}
.frt:focus{outline:none;border-color:var(--pl);}
.err-msg{display:none;color:var(--er);font-size:12px;margin-top:8px;padding:6px 11px;background:#fff0f0;border-radius:4px;border-left:3px solid var(--er);}
.err-msg.show{display:block;}
.qw.has-err{outline:2px solid var(--er);}
.nav{display:flex;gap:10px;justify-content:flex-end;margin-top:20px;padding-top:16px;border-top:1px solid var(--bd);}
.btn{padding:10px 26px;border-radius:6px;font-family:inherit;font-size:13.5px;font-weight:700;cursor:pointer;border:none;transition:all .15s;}
.btn-p{background:var(--pr);color:#fff;}
.btn-p:hover{background:var(--pl);transform:translateY(-1px);box-shadow:0 4px 10px rgba(26,74,122,.3);}
.btn-s{background:#fff;color:var(--pr);border:1.5px solid var(--pr);}
.btn-s:hover{background:#edf3fb;}
.btn-sub{background:linear-gradient(135deg,var(--gr),#1b5e38);color:#fff;padding:12px 34px;font-size:14px;}
.btn-sub:hover{transform:translateY(-2px);box-shadow:0 5px 16px rgba(46,125,82,.35);}
.pg{display:none;}
.pg.act{display:block;}
.ty{display:none;text-align:center;background:var(--cd);border-radius:8px;border:1px solid var(--bd);margin-top:20px;overflow:hidden;}
.ty.show{display:block;}
.ty-content{padding:48px 20px 32px;}
.ty-ic{width:60px;height:60px;background:var(--gr);border-radius:50%;margin:0 auto 18px;display:flex;align-items:center;justify-content:center;font-size:26px;color:#fff;}
.ty h2{font-size:20px;color:var(--pr);margin-bottom:10px;}
.ty p{font-size:13.5px;color:var(--ts);line-height:1.8;}
.ty-photo{width:100%;display:none;position:relative;}
.ty-photo.show{display:block;}
.ty-photo img{width:100%;height:auto;display:block;}
.ty-photo::before{content:'';position:absolute;top:0;left:0;right:0;height:60px;background:linear-gradient(to top,rgba(255,255,255,0),rgba(255,255,255,1));z-index:1;}
.ty-bg{display:none;}
/* ADMIN */
.adm-btn{position:fixed;bottom:20px;right:20px;background:var(--pr);color:#fff;border:none;border-radius:50%;width:44px;height:44px;font-size:18px;cursor:pointer;box-shadow:0 3px 12px rgba(0,0,0,.25);z-index:100;transition:all .2s;}
.adm-btn:hover{background:var(--pl);transform:scale(1.1);}
.adm-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;align-items:center;justify-content:center;}
.adm-overlay.show{display:flex;}
.adm-box{background:#fff;border-radius:10px;width:min(700px,96vw);max-height:90vh;display:flex;flex-direction:column;overflow:hidden;box-shadow:0 20px 60px rgba(0,0,0,.3);}
.adm-hdr{background:linear-gradient(90deg,var(--pr),var(--pl));color:#fff;padding:14px 20px;display:flex;align-items:center;justify-content:space-between;}
.adm-hdr h2{font-size:16px;font-weight:700;}
.adm-close{background:none;border:none;color:#fff;font-size:20px;cursor:pointer;line-height:1;}
.adm-body{flex:1;overflow-y:auto;padding:20px;}
.adm-tabs{display:flex;border-bottom:2px solid var(--bd);margin-bottom:16px;}
.adm-tab{padding:9px 18px;font-size:13px;font-weight:700;cursor:pointer;border:none;background:none;color:var(--ts);border-bottom:3px solid transparent;margin-bottom:-2px;font-family:inherit;transition:all .15s;}
.adm-tab.act{color:var(--pr);border-bottom-color:var(--pr);}
.adm-foot{padding:14px 20px;border-top:1px solid var(--bd);display:none;gap:10px;align-items:center;}
.adm-foot.show{display:flex;}
.btn-save{background:var(--gr);color:#fff;border:none;border-radius:6px;padding:9px 24px;font-size:13.5px;font-weight:700;cursor:pointer;font-family:inherit;}
.btn-save:hover{opacity:.9;}
.btn-rst{background:none;border:1.5px solid var(--bd);border-radius:6px;padding:9px 18px;font-size:13px;color:var(--ts);cursor:pointer;font-family:inherit;font-weight:700;}
.btn-rst:hover{border-color:var(--er);color:var(--er);}
.save-ok{color:var(--gr);font-size:13px;margin-right:auto;display:none;}
.save-ok.show{display:inline;}
/* LOGIN */
.login-wrap{display:flex;flex-direction:column;gap:14px;max-width:300px;margin:20px auto;}
.login-wrap h3{font-size:15px;text-align:center;}
.login-wrap input{padding:10px 13px;border:1.5px solid var(--bd);border-radius:6px;font-size:14px;font-family:inherit;font-weight:700;width:100%;}
.login-wrap input:focus{outline:none;border-color:var(--pl);}
.login-err{color:var(--er);font-size:12px;display:none;text-align:center;}
.login-err.show{display:block;}
/* EDITOR */
.sec-item{border:1.5px solid var(--bd);border-radius:6px;overflow:hidden;margin-bottom:8px;}
.sec-hd{display:flex;align-items:center;gap:8px;padding:10px 14px;cursor:pointer;background:#f7f9fc;}
.sec-hd:hover{background:#edf3fb;}
.sec-hd-t{flex:1;font-size:13.5px;font-weight:700;}
.sec-ar{font-size:11px;color:var(--ts);}
.sec-bd{display:none;padding:12px 14px;border-top:1px solid var(--bd);}
.sec-bd.open{display:block;}
.qed{border:1px solid var(--bd);border-radius:6px;padding:12px;margin-bottom:10px;background:#fafbfc;}
.qed-top{display:flex;gap:8px;align-items:flex-start;margin-bottom:8px;}
.qed-top textarea{flex:1;border:1.5px solid var(--bd);border-radius:5px;padding:7px 10px;font-size:13px;font-family:inherit;font-weight:700;line-height:1.6;resize:vertical;min-height:52px;}
.qed-top textarea:focus{outline:none;border-color:var(--pl);}
.qed-del{background:none;border:none;color:var(--er);font-size:18px;cursor:pointer;padding:2px;line-height:1;flex-shrink:0;}
.qed-opts{display:flex;flex-direction:column;gap:5px;margin-bottom:8px;}
.opt-row{display:flex;gap:6px;align-items:center;}
.opt-row input{flex:1;border:1.5px solid var(--bd);border-radius:5px;padding:5px 9px;font-size:12.5px;font-family:inherit;font-weight:700;}
.opt-row input:focus{outline:none;border-color:var(--pl);}
.opt-del{background:none;border:none;color:var(--ts);font-size:15px;cursor:pointer;}
.opt-del:hover{color:var(--er);}
.add-opt-btn{width:100%;border:1px dashed var(--bd);border-radius:4px;padding:4px 10px;font-size:12px;color:var(--ts);cursor:pointer;background:none;font-family:inherit;font-weight:700;}
.add-opt-btn:hover{border-color:var(--pl);color:var(--pl);}
.qed-req{display:flex;align-items:center;gap:5px;font-size:12px;color:var(--ts);margin-top:6px;}
.add-q-btn{width:100%;border:1.5px dashed var(--pl);background:none;border-radius:6px;padding:9px;font-size:13px;color:var(--pl);cursor:pointer;margin-top:6px;font-family:inherit;font-weight:700;}
.add-q-btn:hover{background:#edf3fb;}
/* RESULTS */
.res-stats{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:20px;}
.stat-card{background:linear-gradient(135deg,var(--pr),var(--pl));color:#fff;border-radius:8px;padding:14px 18px;min-width:110px;text-align:center;}
.stat-card .num{font-size:26px;font-weight:700;}
.stat-card .lbl{font-size:10px;opacity:.85;margin-top:2px;}
.res-sec{margin-bottom:24px;border:1px solid var(--bd);border-radius:8px;overflow:hidden;}
.res-sec-hdr{background:linear-gradient(90deg,var(--pr),var(--pl));color:#fff;padding:10px 16px;font-size:13px;font-weight:700;}
.res-sec-body{padding:14px;}
.res-q{margin-bottom:16px;padding-bottom:16px;border-bottom:1px solid #f0f0f0;}
.res-q:last-child{border:none;margin-bottom:0;padding-bottom:0;}
.res-q-text{font-size:13px;font-weight:700;margin-bottom:8px;line-height:1.5;}
.res-q-n{font-size:11px;color:var(--ts);margin-bottom:6px;}
.bar-row{display:flex;align-items:center;gap:8px;margin-bottom:4px;}
.bar-lbl{font-size:11.5px;width:160px;flex-shrink:0;text-align:right;line-height:1.3;}
.bar-wrap{flex:1;background:#f0f2f5;border-radius:4px;height:20px;overflow:hidden;}
.bar-fill{height:100%;border-radius:4px;display:flex;align-items:center;justify-content:flex-end;padding-right:6px;}
.bar-fill span{font-size:10.5px;font-weight:700;color:#fff;}
.bar-cnt{font-size:11px;color:var(--ts);width:36px;flex-shrink:0;}
.free-wrap{background:#f7f9fc;border-radius:6px;padding:10px 12px;}
.free-item{font-size:13px;padding:5px 0;border-bottom:1px solid #eee;line-height:1.6;}
.free-item:last-child{border:none;}
.no-data{text-align:center;padding:40px;color:var(--ts);font-size:14px;}
/* DESIGN */
.ds-sec{margin-bottom:22px;}
.ds-sec-title{font-size:13px;font-weight:700;color:var(--pr);border-bottom:2px solid var(--pr);padding-bottom:6px;margin-bottom:14px;}
.ds-row{display:flex;align-items:center;gap:10px;margin-bottom:10px;flex-wrap:wrap;}
.ds-lbl{font-size:12.5px;font-weight:700;min-width:110px;flex-shrink:0;}
.ds-input{border:1.5px solid var(--bd);border-radius:5px;padding:6px 10px;font-size:13px;font-family:inherit;font-weight:700;background:#fff;flex:1;min-width:160px;}
.ds-input:focus{outline:none;border-color:var(--pl);}
.ds-color{width:38px;height:30px;border:1.5px solid var(--bd);border-radius:5px;cursor:pointer;padding:1px 2px;}
.ds-range{flex:1;accent-color:var(--pr);}
.ds-range-val{font-size:12px;color:var(--ts);min-width:36px;text-align:right;}
.ds-presets{display:flex;gap:6px;flex-wrap:wrap;}
.ds-dot{width:26px;height:26px;border-radius:4px;cursor:pointer;border:2px solid transparent;box-shadow:0 1px 4px rgba(0,0,0,.15);transition:all .15s;flex-shrink:0;}
.ds-dot:hover,.ds-dot.act{border-color:var(--pr);transform:scale(1.1);}
.ds-select{border:1.5px solid var(--bd);border-radius:5px;padding:6px 10px;font-size:13px;font-family:inherit;font-weight:700;background:#fff;cursor:pointer;flex:1;}
.ds-textarea{width:100%;border:1.5px solid var(--bd);border-radius:5px;padding:8px 10px;font-size:13px;font-family:inherit;font-weight:700;line-height:1.6;resize:vertical;min-height:70px;}
.ds-textarea:focus{outline:none;border-color:var(--pl);}
.ds-img-prev{width:100%;height:60px;border-radius:6px;background:#f0f2f5;border:1.5px dashed var(--bd);display:flex;align-items:center;justify-content:center;font-size:12px;color:var(--ts);overflow:hidden;margin-bottom:8px;}
.ds-img-prev img{width:100%;height:100%;object-fit:cover;}
.ds-file-btn{font-size:12px;padding:6px 14px;border:1.5px solid var(--pl);border-radius:5px;color:var(--pl);background:#fff;cursor:pointer;font-family:inherit;font-weight:700;}
.ds-file-btn:hover{background:#edf3fb;}
.ds-clear-btn{font-size:12px;padding:6px 12px;border:1.5px solid var(--bd);border-radius:5px;color:var(--ts);background:#fff;cursor:pointer;font-family:inherit;font-weight:700;}
.ds-clear-btn:hover{border-color:var(--er);color:var(--er);}
.confirm-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.65);z-index:9999;align-items:center;justify-content:center;}
.confirm-overlay.show{display:flex;}
.confirm-box{background:#fff;border-radius:12px;padding:32px 28px;max-width:360px;width:90%;box-shadow:0 20px 60px rgba(0,0,0,.4);text-align:center;}
.confirm-icon{font-size:44px;margin-bottom:14px;}
.confirm-box h3{font-size:17px;font-weight:700;color:var(--tx);margin-bottom:10px;}
.confirm-box p{font-size:13px;color:var(--ts);line-height:1.8;margin-bottom:22px;}
.confirm-btns{display:flex;gap:10px;justify-content:center;}
.confirm-btn-cancel{padding:10px 24px;border-radius:6px;border:1.5px solid var(--bd);background:#fff;color:var(--ts);font-size:13.5px;font-weight:700;cursor:pointer;font-family:inherit;}
.confirm-btn-cancel:hover{border-color:var(--pr);color:var(--pr);}
.confirm-btn-delete{padding:10px 24px;border-radius:6px;border:none;background:#c0392b;color:#fff;font-size:13.5px;font-weight:700;cursor:pointer;font-family:inherit;}
.confirm-btn-delete:hover{background:#a93226;}


/* ===== HERO PHOTO ===== */
.hero-photo{max-width:720px;margin:0 auto;padding:0 16px;overflow:hidden;display:none;position:relative;}
.hero-photo.show{display:block;}
.hero-photo img{width:100%;height:auto;display:block;border-radius:6px;}
.hero-photo::before{content:'';position:absolute;top:0;left:0;right:0;height:60px;background:linear-gradient(to bottom,rgba(255,255,255,1) 0%,rgba(255,255,255,0) 100%);pointer-events:none;z-index:1;}
.hero-photo::after{content:'';position:absolute;bottom:0;left:0;right:0;height:80px;background:linear-gradient(to bottom,rgba(255,255,255,0) 0%,rgba(255,255,255,0.5) 40%,rgba(255,255,255,0.85) 70%,rgba(255,255,255,1) 100%);pointer-events:none;z-index:1;}
.hero-photo-empty{width:100%;height:160px;background:#e8edf2;display:flex;align-items:center;justify-content:center;color:#aaa;font-size:13px;}


.hdr::after{}

/* PRINT */
#print-area{display:none;}
@media print{
  body>*:not(#print-area){display:none!important;}
  #print-area{display:block!important;}
  .print-hdr{margin-bottom:20px;border-bottom:2px solid #1a4a7a;padding-bottom:10px;}
  .print-hdr h1{font-size:18px;color:#1a4a7a;}
  .print-hdr p{font-size:11px;color:#666;margin-top:4px;}
  .res-sec{page-break-inside:avoid;margin-bottom:16px;}
  .res-sec-hdr,.bar-fill,.stat-card{-webkit-print-color-adjust:exact;print-color-adjust:exact;}
}
</style>
</head>
<body>
<div class="status-banner" id="status-banner" style="display:none;">&#128683; 現在、このアンケートは受付を停止しています</div>
<div class="hdr" id="site-hdr">
<div class="hdr-in">
<div class="badge" id="hdr-badge">2025年度</div>
<h1 id="hdr-title">実働訓練アンケート</h1>
<p id="hdr-desc">訓練、大変お疲れ様でした。災害拠点病院として、当院が果たさなければならない役割に向かって、少しずつですが、近づいていけるようにしたいと思います。皆様のご協力・ご尽力に感謝いたします。今後の改善のために役立てたいと思いますので、下記のアンケートにお答えください。</p>
<p class="req-note" id="hdr-reqnote"><span id="hdr-reqspan">*</span><span id="hdr-reqtext"> は必須の質問です</span></p>
</div>
</div>
<div class="hero-photo" id="hero-photo"></div>
<div class="pb-wrap"><div class="pb"><div class="pf" id="pf" style="width:0%"></div></div></div>
<div class="con">
<div id="survey-area"></div>
<div class="ty" id="ty">
<div class="ty-content">
<div class="ty-ic">&#10003;</div>
<h2>ご回答ありがとうございました</h2>
<p>アンケートへのご協力に深く感謝いたします。<br>皆様のご意見を今後の訓練改善に活用させていただきます。</p>
</div>
<div class="ty-photo" id="ty-photo"></div>
</div>
</div>
<button class="adm-btn" onclick="openAdm()" title="管理画面">&#9881;</button>
<div class="adm-overlay" id="adm-overlay">
<div class="adm-box">
<div class="adm-hdr">
<h2>&#128295; アンケート管理画面</h2>
<button class="adm-close" onclick="closeAdm()">&#10005;</button>
</div>
<div class="adm-body" id="adm-body"></div>
<div class="adm-foot" id="adm-foot">
<span class="save-ok" id="save-ok"></span>
<button class="btn-rst" id="foot-rst" onclick="footRst()"></button>
<button class="btn-save" id="foot-save" onclick="footSave()"></button>
</div>
</div>
</div>
<div id="print-area"></div>
<div class="confirm-overlay" id="confirm-overlay">
<div class="confirm-box">
<div class="confirm-icon">&#128465;</div>
<h3 id="confirm-title">削除の確認</h3>
<p id="confirm-msg"></p>
<div class="confirm-btns">
<button class="confirm-btn-cancel" onclick="closeConfirm()">キャンセル</button>
<button class="confirm-btn-delete" id="confirm-ok-btn">削除する</button>
</div>
</div>

  // 受付中：通常通りページ生成

  var allSecs = [q1sec].concat(sections);
  allSecs.forEach(function(sec){

}

function buildSection(sec) {
  var h = '<div class="sh">'+esc(sec.title)+'</div>';
  sec.questions.forEach(function(q){ h += buildQ(q); });
  if(sec.id==='s_q1'){
    h += '<div class="nav"><button class="btn btn-p" onclick="nxtQ1()">次へ</button></div>';
  } else if(sec.id==='s_final'){
    h += '<div class="nav"><button class="btn btn-s" onclick="goBack()">戻る</button><button class="btn btn-sub" onclick="submitForm()">送信する</button></div>';
  } else {
    h += '<div class="nav"><button class="btn btn-s" onclick="goBack()">戻る</button><button class="btn btn-p" onclick="nxtSec(\''+sec.id+'\')">次へ</button></div>';
  }
  return h;
}

function buildQ(q) {
  var h = '<div class="qw" id="qw_'+q.id+'">';
  h += '<div class="ql"><span class="qn">'+q.id.replace('q','')+'</span>'+esc(q.text);
  if(q.required) h += '<span class="req">*</span>';
  h += '</div>';
  if(q.required && q.opts) h += '<div class="hint">1つだけマークしてください。</div>';
  if(!q.opts){
    h += '<textarea class="frt" name="'+q.id+'" placeholder="ご自由にお書きください"></textarea>';
  } else {
    h += '<div class="opts">';
    q.opts.forEach(function(opt){
      h += '<label class="opt"><input type="radio" name="'+q.id+'" value="'+esc(opt)+'"><span class="rd"></span><span class="ot">'+esc(opt)+'</span></label>';
    });
    h += '</div>';
  }
  if(q.required) h += '<div class="err-msg" id="em_'+q.id+'">この質問は必須です。</div>';
  h += '</div>';
  return h;
}

function esc(s){
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ===== VALIDATE =====
function validate(secId){
  var sec=(secId==='s_q1')?{questions:[{id:'q1',required:true,opts:['x']}]}:sections.find(function(s){return s.id===secId;});
  if(!sec)return true;
  var ok=true;
  sec.questions.forEach(function(q){
    if(!q.required)return;
    var qw=document.getElementById('qw_'+q.id);
    var em=document.getElementById('em_'+q.id);
    if(!qw)return;
    var ans=q.opts?!!document.querySelector('input[name="'+q.id+'"]:checked'):(function(){var ta=document.querySelector('textarea[name="'+q.id+'"]');return ta&&ta.value.trim().length>0;})();
    if(!ans){
      qw.classList.add('has-err');
      if(em)em.classList.add('show');
      if(ok)qw.scrollIntoView({behavior:'smooth',block:'center'});
      ok=false;
    } else {
      qw.classList.remove('has-err');
      if(em)em.classList.remove('show');
    }
  });
  return ok;
}

document.addEventListener('change',function(e){
  if(e.target.type==='radio'){
    var n=e.target.name;
    document.querySelectorAll('input[name="'+n+'"]').forEach(function(r){r.closest('.opt').classList.remove('sel');});
    e.target.closest('.opt').classList.add('sel');
    var qw=document.getElementById('qw_'+n);
    var em=document.getElementById('em_'+n);
    if(qw)qw.classList.remove('has-err');
    if(em)em.classList.remove('show');
  }
});

function nxtQ1(){
  if(!validate('s_q1'))return;
  var v=document.querySelector('input[name="q1"]:checked').value;
  var t=Q1_MAP[v];
  pageHist=[];
  if(t)pushShow('pg_'+t);
}

function nxtSec(secId){
  if(!validate(secId))return;
  var sec=sections.find(function(s){return s.id===secId;});
  if(!sec){pushShow('pg_s_final');return;}
  var bq=sec.questions.find(function(q){return q.branch;});
  if(bq){
    var el=document.querySelector('input[name="'+bq.id+'"]:checked');
    if(el){
      var map=BRANCH_MAPS[bq.branchKey];
      var t=map&&map[el.value];
      if(t){pushShow('pg_'+t);return;}
    }
  }
  pushShow('pg_s_final');
}

  saveResp();
  document.getElementById('pf').style.width='100%';
  document.getElementById('survey-area').style.display='none';
  document.getElementById('ty').classList.add('show');
  window.scrollTo({top:0,behavior:'smooth'});

function saveResp(){
  var q1sec={id:'s_q1',title:'基本情報',questions:[{id:'q1',text:'発災時の役は何ですか？',opts:Object.keys(Q1_MAP),required:true}]};
  var allSecs=[q1sec].concat(sections);
  var resp={ts:new Date().toISOString(),answers:{}};
  allSecs.forEach(function(sec){
    sec.questions.forEach(function(q){
      var sel='input[name="'+q.id+'"]:checked';
      var tasel='textarea[name="'+q.id+'"]';
      if(!q.opts){
        var ta=document.querySelector(tasel);
        if(ta&&ta.value.trim())resp.answers[q.id]={text:q.text,value:ta.value.trim(),secId:sec.id,secTitle:sec.title};
      } else {
        var el=document.querySelector(sel);
        if(el)resp.answers[q.id]={text:q.text,value:el.value,opts:q.opts,secId:sec.id,secTitle:sec.title};
      }
    });
  });
  var saved=JSON.parse(localStorage.getItem('anketo_resp')||'[]');
  saved.push(resp);
  localStorage.setItem('anketo_resp',JSON.stringify(saved));
  // 削除フラグをクリア（新回答があったので）
  localStorage.removeItem('anketo_cleared');

  // GASへ送信
  var gasUrl = getGasUrl();
  if(gasUrl){
    fetch(gasUrl, {
      method: 'POST',
      mode: 'no-cors',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify(resp)
    }).catch(function(err){
      console.warn('GAS送信エラー:', err);
    });
  }
}

function delOpt(si,qi,oi){

// ===== RESULTS =====
function getResps(){
  var r1 = JSON.parse(localStorage.getItem('anketo_resp')||'[]');
  var r2 = JSON.parse(localStorage.getItem('anketo_responses_2025')||'[]');
  // 両方マージして重複除去
  var all = r1.concat(r2);
  var seen = {};
  return all.filter(function(r){
    if(!r||!r.ts||seen[r.ts]) return false;
    seen[r.ts] = true;
    return true;
  });
}

function renderResults(){
  var tc=document.getElementById('tab-content');if(!tc)return;
  // 削除済みフラグチェック
  var cleared = localStorage.getItem('anketo_cleared');
  if(cleared){
    tc.innerHTML='<div class="no-data">&#128235; まだ回答データがありません。</div>';
    return;
  }
  tc.innerHTML='<div class="no-data" style="color:var(--ts);padding:30px;text-align:center;">&#8987; データを読み込み中...</div>';
  var gasUrl=getGasUrl();
  if(gasUrl){
    fetchGasData(function(gasResps){
      if(gasResps && gasResps.length){
        // GASデータをlocalStorageにマージ
        var local=getResps();
        var merged=gasResps.concat(local);
        // 重複除去（ts基準）
        var seen={};
        merged=merged.filter(function(r){if(seen[r.ts])return false;seen[r.ts]=true;return true;});
        renderResultsWithData(tc,merged);
      } else {
        renderResultsWithData(tc,getResps());
      }
    });
  } else {
    renderResultsWithData(tc,getResps());
  }
}
function renderResultsWithData(tc,resps){
  if(!resps.length){tc.innerHTML='<div class="no-data">&#128235; まだ回答データがありません。</div>';return;}
  var q1sec={id:'s_q1',title:'基本情報',questions:[{id:'q1',text:'発災時の役は何ですか？',opts:Object.keys(Q1_MAP),required:true}]};
  var allSecs=[q1sec].concat(sections);
  var secMap={};
  allSecs.forEach(function(sec){
    secMap[sec.id]={title:sec.title,questions:{}};
    sec.questions.forEach(function(q){
      secMap[sec.id].questions[q.id]={text:q.text,opts:q.opts||null,counts:{},freeTexts:[]};
      if(q.opts)q.opts.forEach(function(o){secMap[sec.id].questions[q.id].counts[o]=0;});
    });
  });
  resps.forEach(function(resp){
    Object.keys(resp.answers).forEach(function(qid){
      var a=resp.answers[qid];
      if(!secMap[a.secId]||!secMap[a.secId].questions[qid])return;
      var qd=secMap[a.secId].questions[qid];
      if(a.opts){qd.counts[a.value]=(qd.counts[a.value]||0)+1;}
      else{qd.freeTexts.push(a.value);}
    });
  });
  var total=resps.length;
  var deptCnt={};
  resps.forEach(function(r){var q1=r.answers['q1'];if(q1)deptCnt[q1.value]=(deptCnt[q1.value]||0)+1;});
  var h='<div class="res-stats"><div class="stat-card"><div class="num">'+total+'</div><div class="lbl">総回答数</div></div>';
  Object.keys(deptCnt).forEach(function(d){h+='<div class="stat-card" style="background:linear-gradient(135deg,#1a7a4a,#0f5233);"><div class="num">'+deptCnt[d]+'</div><div class="lbl">'+esc(d)+'</div></div>';});
  h+='</div>';
  var actSecs={};resps.forEach(function(r){Object.values(r.answers).forEach(function(a){actSecs[a.secId]=true;});});
  allSecs.forEach(function(sec){
    if(!actSecs[sec.id])return;
    var sd=secMap[sec.id];
    h+='<div class="res-sec"><div class="res-sec-hdr">'+esc(sec.title)+'</div><div class="res-sec-body">';
    Object.keys(sd.questions).forEach(function(qid){
      var qd=sd.questions[qid];
      var hasData=qd.opts?Object.values(qd.counts).some(function(c){return c>0;}):qd.freeTexts.length>0;
      if(!hasData)return;
      h+='<div class="res-q"><div class="res-q-text">'+esc(qd.text)+'</div>';
      if(qd.opts){
        var tot=Object.values(qd.counts).reduce(function(a,b){return a+b;},0);
        h+='<div class="res-q-n">回答数: '+tot+'件</div>';
        h+=buildPie(qd.opts,qd.counts,tot);
      } else {
        h+='<div class="res-q-n">回答数: '+qd.freeTexts.length+'件</div><div class="free-wrap">';
        qd.freeTexts.forEach(function(t){h+='<div class="free-item">&#183; '+esc(t)+'</div>';});
        h+='</div>';
      }
      h+='</div>';
    });
    h+='</div></div>';
  });
  tc.innerHTML=h;
}

function buildPie(opts,counts,tot){
  if(tot===0)return '';
  var R=70,cx=80,cy=80,r=70;
  var startAngle=-Math.PI/2;
  var svgPaths='';
  var legendH='<div class="pie-legend">';
  var validOpts=opts.filter(function(o){return (counts[o]||0)>0;});

  validOpts.forEach(function(opt,i){
    var cnt=counts[opt]||0;
    var pct=cnt/tot;
    var col=BAR_COLORS[i%BAR_COLORS.length];
    var endAngle=startAngle+pct*2*Math.PI;

    if(validOpts.length===1){
      // 全部同じ場合は円全体を塗る
      svgPaths+='<circle cx="'+cx+'" cy="'+cy+'" r="'+r+'" fill="'+col+'"/>';
    } else {
      var x1=cx+r*Math.cos(startAngle);
      var y1=cy+r*Math.sin(startAngle);
      var x2=cx+r*Math.cos(endAngle);
      var y2=cy+r*Math.sin(endAngle);
      var large=pct>0.5?1:0;
      svgPaths+='<path d="M'+cx+','+cy+' L'+x1.toFixed(2)+','+y1.toFixed(2)+' A'+r+','+r+' 0 '+large+',1 '+x2.toFixed(2)+','+y2.toFixed(2)+' Z" fill="'+col+'"/>';
    }

    // パーセント表示（5%以上の場合のみセグメント内に表示）
    if(pct>=0.05){
      var midAngle=startAngle+pct*Math.PI;
      var lr=r*0.65;
      var tx=cx+lr*Math.cos(midAngle);
      var ty=cy+lr*Math.sin(midAngle);
      svgPaths+='<text x="'+tx.toFixed(1)+'" y="'+ty.toFixed(1)+'" text-anchor="middle" dominant-baseline="middle" fill="#fff" font-size="11" font-weight="bold">'+Math.round(pct*100)+'%</text>';
    }

    legendH+='<div class="pie-legend-item"><div class="pie-dot" style="background:'+col+';"></div><span class="pie-legend-label">'+esc(opt)+'</span><span class="pie-legend-cnt">'+cnt+'件 ('+Math.round(pct*100)+'%)</span></div>';
    startAngle=endAngle;
  });

  legendH+='</div>';

  var svg='<svg class="pie-svg" width="160" height="160" viewBox="0 0 160 160">'+svgPaths+'<circle cx="'+cx+'" cy="'+cy+'" r="28" fill="#fff"/></svg>';

  return '<div class="pie-wrap">'+svg+legendH+'</div>';
}


function clearResults(){
  var gasUrl = getGasUrl();
  var msg = gasUrl
    ? 'ローカルおよびGoogleスプレッドシートの<br>回答データをすべて削除します。<br><br><strong>この操作は取り消せません。</strong><br>本当に削除しますか？'
    : 'ローカルの回答データをすべて削除します。<br><br><strong>この操作は取り消せません。</strong><br>本当に削除しますか？';
  showConfirm('回答データの削除', msg, function(){
    // 全キー削除
    localStorage.removeItem('anketo_resp');
    localStorage.removeItem('anketo_responses_2025');
    // 削除済みフラグをセット
    localStorage.setItem('anketo_cleared', Date.now().toString());
    // GASデータも削除
    var url = getGasUrl();
    if(url){
      var delUrl = url + (url.indexOf('?')>=0 ? '&' : '?') + 'action=deleteAll';
      fetch(delUrl, {mode:'no-cors'}).catch(function(){});
    }
    // 即座に空表示
    var tc = document.getElementById('tab-content');
    if(tc) tc.innerHTML = '<div class="no-data">&#128235; まだ回答データがありません。</div>';
  });
}

  var q1pg = document.getElementById('pg_s_q1');
  var closedPg = document.getElementById('pg_closed');

  } else {
    // 受付中: 停止画面を非表示、Q1を表示

    if(!document.querySelector('.pg.act') || document.querySelector('.pg.act').id === 'pg_closed'){
      q1pg.style.display = '';

    } else {

function setSurveyOpen(open){

}
function applyStatus(open){
  // バナー（上部帯）
  var banner=document.getElementById('status-banner');
  if(banner){
    banner.style.display = open ? 'none' : 'block';
  }
  // Q1ページを有効/無効化
  var q1pg=document.getElementById('pg_s_q1');
  if(!q1pg) return; // まだ生成されていない場合はスキップ
  if(!open){
    // 無効化
    q1pg.classList.add('survey-disabled');
    if(!document.getElementById('closed-notice')){
      var notice=document.createElement('div');
      notice.id='closed-notice';
      notice.className='survey-closed-notice';
      notice.innerHTML='<div class="notice-icon">&#128683;</div><h3>現在、回答の受付を停止しています</h3><p>受付再開まで、しばらくお待ちください。</p>';
      q1pg.insertBefore(notice, q1pg.firstChild);
    }
  } else {
    // 有効化
    q1pg.classList.remove('survey-disabled');
    var old=document.getElementById('closed-notice');
    if(old) old.remove();
  }
}

function getGasUrl(){
  return localStorage.getItem('anketo_gas_url') || DEFAULT_GAS_URL || '';

// ===== CONFIRM DIALOG =====
var confirmCallback = null;
function showConfirm(title, msg, onOk){
  document.getElementById('confirm-title').textContent = title;
  document.getElementById('confirm-msg').innerHTML = msg;
  confirmCallback = onOk;
  document.getElementById('confirm-ok-btn').onclick = function(){
    var cb = confirmCallback; // 先にコールバックを保存
    closeConfirm();           // その後ダイアログを閉じる（confirmCallbackがnullになる）
    if(cb) cb();              // 保存したコールバックを実行
  };
  document.getElementById('confirm-overlay').classList.add('show');
}
function closeConfirm(){
  document.getElementById('confirm-overlay').classList.remove('show');
  confirmCallback = null;
}


// ===== GAS DATA FETCH =====
function fetchGasData(callback){
  var url = getGasUrl();
  if(!url){ callback(null); return; }
  // GASからデータ取得
  var fetchUrl = url + '?action=getData';
  fetch(fetchUrl)
    .then(function(r){ return r.json(); })
    .then(function(data){
      if(data && data.responses) callback(data.responses);
      else callback(null);
    })
    .catch(function(){ callback(null); });
}

// ===== DOWNLOAD WITH GAS URL =====
function downloadWithGasUrl(){
  var url = getGasUrl();
  if(!url){ alert('GAS URLが設定されていません。'); return; }

  // 現在のHTMLを取得
  var html = document.documentElement.outerHTML;

  // DEFAULT_GAS_URL の空文字をURLに置換
  html = html.replace(
    "var DEFAULT_GAS_URL = '';",
    "var DEFAULT_GAS_URL = '" + url + "';"
  );

  // Blobを作成してダウンロード
  var blob = new Blob([html], {type: 'text/html;charset=utf-8'});
  var a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = '2025年度実働訓練アンケート.html';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(a.href);
}
